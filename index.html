<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday My Love ❤️</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    text-align: center;
    color: white;
}

.container {
    padding: 20px;
    max-width: 90%;
}

h1 {
    font-size: 2.2rem;
    margin-bottom: 15px;
    animation: fadeIn 2s ease-in-out;
}

p {
    font-size: 1.1rem;
    margin-bottom: 25px;
    animation: fadeIn 3s ease-in-out;
}

button {
    padding: 12px 25px;
    border: none;
    border-radius: 30px;
    font-size: 1rem;
    background: white;
    color: #ff4b8b;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff4b8b;
    color: white;
    transform: scale(1.1);
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* Confetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    background-color: white;
    top: -10px;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(720deg);
    }
}

/* Mobile Optimization */
@media (max-width: 600px) {
    h1 {
        font-size: 1.6rem;
    }
    p {
        font-size: 1rem;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>🎉 Happy Birthday My Princess 🎂</h1>
    <p>You are the most beautiful part of my life ❤️  
       May your day be filled with love, happiness, and magical moments ✨</p>
    <button onclick="startConfetti()">Click for Surprise 🎁</button>
</div>

<script>
function startConfetti() {
    for (let i = 0; i < 150; i++) {
        let confetti = document.createElement("div");
        confetti.classList.add("confetti");
        document.body.appendChild(confetti);

        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.backgroundColor = 
            "hsl(" + Math.random() * 360 + ", 100%, 50%)";
        confetti.style.animationDuration = 
            (Math.random() * 3 + 2) + "s";
        confetti.style.opacity = Math.random();

        setTimeout(() => {
            confetti.remove();
        }, 5000);
    }
}
</script>

</body>
</html>
